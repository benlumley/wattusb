<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    color: #1d1d1f;
    background:
      radial-gradient(90% 80% at 12% -20%, rgba(48,200,94,0.16), rgba(255,255,255,0) 55%),
      linear-gradient(120deg, #ffffff 0%, #f6f7f8 100%);
    display: flex; align-items: center; gap: 56px;
    padding: 0 80px; overflow: hidden;
  }
  .left { flex: 1; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 22px; font-weight: 600; color: #1a9d45;
    background: rgba(48,200,94,0.10); border: 1px solid rgba(48,200,94,0.24);
    padding: 9px 18px; border-radius: 100px; margin-bottom: 34px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #30c85e; }
  h1 { font-size: 132px; font-weight: 800; letter-spacing: -0.045em; line-height: 0.9; }
  h1 .w { color: #1a9d45; }
  .tag { font-size: 38px; font-weight: 500; letter-spacing: -0.015em; margin: 28px 0 40px; line-height: 1.18; max-width: 560px; }
  .cmd {
    display: inline-block; background: #1d1d1f; color: #f5f5f7;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 25px;
    padding: 18px 26px; border-radius: 16px; box-shadow: 0 16px 40px rgba(0,0,0,0.18);
  }
  .cmd .p { color: #30c85e; }
  .right { flex: none; }
  .right img {
    width: 430px; border-radius: 16px;
    box-shadow: 0 30px 70px rgba(0,0,0,0.22); transform: rotate(2deg);
  }
</style>
</head>
<body>
  <div class="left">
    <span class="badge"><span class="dot"></span> macOS menu bar app</span>
    <h1>watt<span class="w">usb</span></h1>
    <p class="tag">See exactly how many watts your Mac is pulling.</p>
    <span class="cmd"><span class="p">$ </span>brew install --cask benlumley/tap/wattusb</span>
  </div>
  <div class="right">
    <img src="dropdown-charging.png" alt="">
  </div>
</body>
</html>
